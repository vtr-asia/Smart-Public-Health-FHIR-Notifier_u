<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FHIR App Launching...</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            margin: 0;
        }
        .loader-container { text-align: center; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #2563eb;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #4b5563; font-size: 15px; font-weight: 500; }
        .sub-text { color: #9ca3af; font-size: 12px; margin-top: 8px; }
        .error-box {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            color: #991b1b;
            font-size: 13px;
            max-width: 400px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <p>正在啟動智慧公衛通報系統...</p>
        <p class="sub-text">正在與 EHR 進行安全驗證 (SMART Health IT Sandbox)</p>
        <div class="error-box" id="errorBox"></div>
    </div>

    <script>
        /**
         * SMART on FHIR — Provider EHR Launch 模式
         * 目標環境：https://launch.smarthealthit.org
         *
         * 測試步驟：
         * 1. 前往 https://launch.smarthealthit.org
         * 2. Launch Type → Provider EHR Launch
         * 3. 勾選「Simulate launch within the EHR user interface」
         * 4. 選擇 Patient 與 Provider（必選，否則 encounter context 為空）
         * 5. 在「App Launch URL」填入本 launch.html 的公開 URL
         * 6. 點擊「Launch」
         *
         * 注意：SMART Health IT Sandbox 為 Public Client，不需 client_secret
         */
        FHIR.oauth2.authorize({
            // Sandbox 不驗證 clientId，保留原值或任意字串均可
            clientId: "cc344727-6f90-496c-94fd-c7829aa9a51d",
            clientSecret : "79f04b56b33491716c0880af72cdef7d3f0629111421cedd18353651cd313d9e",
            // Provider Launch 必要 scope：
            // launch          — 取得 EHR 傳入的 launch token
            // patient/*.read  — 讀取該病患所有資源
            // openid fhirUser — 取得登入醫護人員身分
            // online_access   — session 期間持續存取
            scope: "launch patient/*.read openid fhirUser online_access",

            // 授權成功後導向 index.html（需與 Sandbox 填寫的 Redirect URI 一致）
            redirectUri: "index.html",

            completeInTarget: true

        }).catch(function(err) {
            // 顯示授權失敗原因（協助除錯）
            var box = document.getElementById("errorBox");
            box.style.display = "block";
            box.innerHTML = "<strong>授權失敗</strong><br>" + (err.message || JSON.stringify(err));
        });
    </script>
</body>
</html>
